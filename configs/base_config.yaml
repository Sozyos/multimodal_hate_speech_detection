# 多模态恶意言论检测模型配置

# 数据配置
data:
  data_root: "E:/Files/Python/multimodal_hate_speech/data/M3-main/dataset" # M3数据集根目录
  image_size: [224, 224] # 图像尺寸
  max_text_length: 128 # 最大文本长度
  batch_size: 1 # 批大小
  num_workers: 0 # 数据加载线程数
  use_dummy: false # 使用虚拟数据（当真实数据不可用时）

# 模型配置
model:
  image_model_name: "google/vit-base-patch16-224" # 图像编码器
  text_model_name: "bert-base-multilingual-cased" # 文本编码器
  fusion_dim: 768 # 融合特征维度
  num_binary_classes: 2 # 二元分类类别数
  num_multilabel_classes: 8 # 多标签分类类别数
  dropout_rate: 0.1 # Dropout率

# 训练配置
training:
  device: cuda # 设备 (cuda, cpu, mps)
  learning_rate: 2e-5 # 学习率
  weight_decay: 0.01 # 权重衰减
  num_epochs: 20 # 训练轮数
  patience: 5 # 早停耐心值
  gradient_clip: 1.0 # 梯度裁剪

  # 损失权重
  binary_weight: 1.0 # 二元分类损失权重
  multilabel_weight: 1.0 # 多标签分类损失权重

  # 学习率调度
  warmup_ratio: 0.1 # 学习率warmup比例

  # 日志和保存
  experiment_name: "multimodal_hate_speech" # 实验名称
  save_dir: "checkpoints" # 模型保存目录
  save_interval: 5 # 保存检查点的间隔（epoch）
  log_interval: 10 # 训练日志间隔（batch）

  # 实验跟踪
  use_wandb: false # 是否使用WandB

# 评估配置
evaluation:
  threshold: 0.5 # 分类阈值
  output_dir: "evaluation_results" # 评估输出目录
  visualize: true # 是否生成可视化图表
